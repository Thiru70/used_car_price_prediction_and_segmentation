name: Train Model

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 0"

# Note: FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 is no longer required 
# as the runner naturally defaults to Node 24 and the actions now match.

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5 # Upgraded from v4 to support Node 24

    - name: Set up Python
      uses: actions/setup-python@v6 # Upgraded from v5 to support Node 24
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run training
      run: python train.py

    - name: Validate model exists
      run: test -f model.pkl

    - name: Upload model
      uses: actions/upload-artifact@v4
      with:
        name: trained-model
        path: model.pkl
